<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in — Voice Agent</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a14;
      color: #e8e8f0;
    }
    .card {
      width: min(360px, 92vw);
      padding: 32px;
      background: #11111c;
      border: 1px solid #1f1f2e;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
    }
    p.sub {
      margin: 0 0 24px;
      font-size: 13px;
      color: #9090a8;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #c0c0d0;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
      color: #e8e8f0;
      background: #0a0a14;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      outline: none;
    }
    input:focus { border-color: #4f8cff; }
    button {
      width: 100%;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #4f8cff;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: progress; }
    button:hover:not(:disabled) { background: #5f9bff; }
    .error {
      margin-top: 12px;
      padding: 10px 12px;
      font-size: 13px;
      color: #ff8b8b;
      background: rgba(255, 80, 80, .08);
      border: 1px solid rgba(255, 80, 80, .25);
      border-radius: 6px;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <form class="card" id="signin">
    <h1>Voice Agent</h1>
    <p class="sub">Sign in with your portals.cx credentials.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" required />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" required />
    <button type="submit" id="submit">Sign in</button>
    <div class="error" id="error"></div>
  </form>

  <script>
    const form = document.getElementById('signin');
    const submit = document.getElementById('submit');
    const errorBox = document.getElementById('error');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
    }

    function clearError() {
      errorBox.textContent = '';
      errorBox.classList.remove('visible');
    }

    function returnTo() {
      const u = new URL(window.location.href);
      const r = u.searchParams.get('return_to') || '/pipeline';
      // Only allow same-origin paths so a poisoned ?return_to=https://evil
      // can't redirect us off the app.
      return r.startsWith('/') ? r : '/pipeline';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearError();
      submit.disabled = true;
      submit.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/signin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'rid': 'emailpassword',
          },
          credentials: 'include',
          body: JSON.stringify({
            formFields: [
              { id: 'email', value: document.getElementById('email').value.trim() },
              { id: 'password', value: document.getElementById('password').value },
            ],
          }),
        });

        if (!res.ok) {
          showError(`Sign-in failed (HTTP ${res.status}).`);
          return;
        }

        const data = await res.json();
        if (data.status === 'OK') {
          window.location.assign(returnTo());
          return;
        }
        if (data.status === 'WRONG_CREDENTIALS_ERROR') {
          showError('Email or password is incorrect.');
          return;
        }
        if (data.status === 'FIELD_ERROR' && Array.isArray(data.formFields)) {
          showError(data.formFields.map((f) => f.error).join(' '));
          return;
        }
        showError(`Sign-in error: ${data.status || 'unknown'}.`);
      } catch (err) {
        showError('Network error. Try again.');
      } finally {
        submit.disabled = false;
        submit.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
